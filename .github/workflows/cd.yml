name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      # 1️⃣ Checkout code
      - name: Check out code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build the app
      - name: Build app
        run: npm run build

      # 5️⃣ Authenticate gcloud using the secret
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # 6️⃣ Setup Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 7️⃣ Test gcloud CLI
      - name: Use gcloud CLI
        run: gcloud info

      # 8️⃣ Build and push Docker image to Artifact Registry
      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/notely-489803/notely-ar-repo/notely:latest .

      # 9️⃣ Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/notely-489803/notely-ar-repo/notely:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --project notely-489803 \
            --max-instances=4