name: Continuous Deployment

on:
  push:
    branches: [main]

jobs:
  Deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout الكود
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build app
      - name: Build app
        run: npm run build

      # 5️⃣ Authenticate gcloud using secret directly
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: notely-489803
          service_account_key: ${{ secrets.GCP_CREDENTIALS }}
          export_default_credentials: true

      # 6️⃣ Build & push Docker image
      - name: Build and push Docker image with Cloud Build
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/notely-489803/notely-ar-repo/notely:latest .